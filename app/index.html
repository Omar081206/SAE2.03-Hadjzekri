<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <section id="category"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js"
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js"

      let movies = await DataMovie.requestMovies();
      let moviesBycategory = await DataMovie.requestMovieByCategory();
      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerDetails = async function(id_film){
        let details = await DataMovie.requestMovieDetails(id_film);
        V.renderMovieDetails(details);
      }

      C.handlerProfileFormat = async function(id_profile) {
        
      }

      C.handlerHome = function(){
        V.renderMovies(movies);
      }

      C.handlerProfile = function(){

      }

      C.start = function () {
        V.renderNavBar("C.handlerHome()");
        V.renderMoviesCategory(moviesBycategory);
      };
      

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hHome, hProfile) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hHome, hProfile);
      };
      V.renderMovies = function(data){
        let content = document.querySelector("#content");
        content.innerHTML = Movie.format(data);
      }
      V.renderMovieDetails = function(data){
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(data);
      }
      V.renderMoviesCategory = function (groupedData) {
          let content = document.querySelector("#content");
          let html = "";
          for (let category in groupedData) {
              let moviesInCat = groupedData[category];
              let moviesHtml = Movie.format(moviesInCat);
              html += MovieCategory.format(category, moviesHtml);
          }
          content.innerHTML = html;
      };


      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
