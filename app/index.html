<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { Favorite } from "./component/Favorite/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { DataFavorite } from "./data/dataFavorite.js";

      let profiles = await DataProfile.requestProfiles();
      let currentFilteredMovies = null;
      let currentProfileId = null;
      let currentFavorites = null;
      let content = document.querySelector("#content");
      content.innerHTML = "<h2 style='text-align:center; padding: 3rem;'>Veuillez sélectionner un profil pour découvrir le catalogue.</h2>";

      window.C = {};

      C.handlerDetails = async function(id_film){
        let details = await DataMovie.requestMovieDetails(id_film);
        V.renderMovieDetails(details, currentFavorites);
      }

      C.handlerHome = function(){
        let content = document.querySelector("#content");
        if (currentFilteredMovies) {
            V.renderMoviesCategory(currentFilteredMovies);
        } 
        else {
            content.innerHTML = "<h2 style='text-align:center; padding: 3rem;'>Veuillez sélectionner un profil pour découvrir le catalogue.</h2>";
        }      
      }

      C.handlerProfile = async function(id_profile) {
        if (!id_profile) {
            currentFilteredMovies = null;
            currentProfileId = null;
            currentFavorites = null;
            C.handlerHome(); 
        }
        currentProfileId = id_profile;
        let currentProfile = DataProfile.getProfileById(id_profile, profiles);
        currentFilteredMovies = await DataMovie.requestMovieByCategory(currentProfile.min_age);
        currentFavorites = await DataFavorite.requestfavorites(id_profile);
        
        V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
      };

      C.handlerLogout = function() {
        currentFilteredMovies = null; 
        
        C.handlerHome(); 
      };

      C.handlerAddFavorite = async function(id_movie) {
        await DataFavorite.addFavorite(currentProfileId, id_movie);
        alert("Film ajouté aux favoris ");
        currentFavorites = await DataFavorite.requestfavorites(currentProfileId);
        V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
      };

      C.handlerRemoveFavorite = async function(id_movie) {
        await DataFavorite.removeFavorite(currentProfileId, id_movie);
        alert("Film retiré des favoris ");
        currentFavorites = await DataFavorite.requestfavorites(currentProfileId);
        V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
      };

      C.start = function () {
        V.renderNavBar("C.handlerHome()", "C.handlerLogout()", profiles);
      };
      

      

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hHome, hLogout, hProfile) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hHome, hLogout, hProfile);
      };

      V.renderMovieDetails = function(data, favorites = []){
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(data, favorites);
      }
      V.renderMoviesCategory = function (groupedData) {
          let content = document.querySelector("#content");
          content.innerHTML = MovieCategory.format(groupedData);
      };
      
      V.renderFavoritesAndMovies = function(favorites, groupedMovies) {
          let content = document.querySelector("#content");
          let html = MovieCategory.format(groupedMovies);
          let favoritesHtml = Favorite.format(favorites);
          if (favoritesHtml) {
              html += favoritesHtml;
          }
          
          content.innerHTML = html;
      };


      C.start(); 
    </script>
  </body>
</html>
<script type="module"></script>
