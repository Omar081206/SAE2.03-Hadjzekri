<div class="addMovie">
    <p class="addMenu__title"># Ajouter un film</p>
    <form class="addMovie__form">

        <input required type="text" name="titre" placeholder="Saisir le titre">
        <input required type="text" name="realisateur" placeholder="Saisir le réalisateur">
        <input required type="number" name="annee" placeholder="Saisir l'année de sortie">
        <input required type="number" name="duree" placeholder="Saisir la durée en minutes">
        <input required type="text" name="description" placeholder="Saisir la description">
        <select name="categorie" required>
            <option value="1">Action</option>
            <option value="2">Comédie</option>
            <option value="3">Drame</option>
            <option value="4">Science-fiction</option>
            <option value="5">Animation</option>
            <option value="6">Thriller</option>
            <option value="7">Horreur</option>
            <option value="8">Aventure</option>
            <option value="9">Fantaisie</option>
            <option value="10">Documentaire</option>
        </select>
        <input required type="text" name="affiche" placeholder="Saisir le nom du fichier de l'affiche ou image du film">
        <input required type="text" name="trailer" placeholder="Saisir l'URL du trailer">
        <input required type="number" name="age" placeholder="Saisir la restriction d'âge">
        
        <input onclick="{{handler}}" type="button" value="Update" name="todo">

    </form>
</div>
