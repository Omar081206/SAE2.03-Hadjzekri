<div class="UpdateProfil">
    <p class="UpdateProfil__title"># Modifier un profil</p>
    <form class="UpdateProfil__form">
        <select name="id">
            {{ProfileList}}
        </select>
        <input class="UpdateProfil__input" required type="text" name="nom" placeholder="Saisir un nom">
        <input class="UpdateProfil__input" type="text" name="avatar" placeholder="Saisir le nom du fichier de l'avatar">
        <select class="UpdateProfil__input" name="age">
            <option class="UpdateProfil__input" value="10">Tout public</option>
            <option class="UpdateProfil__input" value="12">Limite d'âge 12 ans</option>
            <option class="UpdateProfil__input" value="16">Limite d'âge 16 ans</option>
            <option class="UpdateProfil__input" value="18">Limite d'âge 18 ans</option>
        </select>
        <input class="UpdateProfil__btn" onclick="{{handler}}" type="button" value="Update" name="todo">
    </form>
</div>
